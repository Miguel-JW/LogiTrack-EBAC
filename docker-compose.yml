version: '3.8'

services:

  mysql:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: logitrack
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql

  mongodb:
    image: mongo:6.0
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  zookeeper:
    image: confluentinc/cp-zookeeper:7.4.0
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181

  kafka:
    image: confluentinc/cp-kafka:7.4.0
    depends_on: [zookeeper]
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1

  localstack:
    image: localstack/localstack
    ports:
      - "4566:4566"
    environment:
      - SERVICES=sqs,dynamodb,s3
      - DEFAULT_REGION=us-east-1

  auth-service:
    build: ./auth-service
    ports:
      - "8081:8081"
    environment:
      - SPRING_DATASOURCE_URL=jdbc:mysql://mysql:3306/logitrack
    depends_on: [mysql]

  user-service:
    build: ./user-service
    ports:
      - "8082:8082"
    depends_on: [mysql]

  order-service:
    build: ./order-service
    ports:
      - "8083:8083"
    depends_on: [mysql, kafka]

  delivery-service:
    build: ./delivery-service
    ports:
      - "8084:8084"
    depends_on: [mysql, kafka]

  tracking-service:
    build: ./tracking-service
    ports:
      - "8085:8085"
    depends_on: [mongodb, kafka]

  notification-service:
    build: ./notification-service
    ports:
      - "8086:8086"
    depends_on: [kafka]

volumes:
  mysql_data:
  mongo_data:
